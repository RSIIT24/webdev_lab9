<!DOCTYPE html>
<html lang="en">

  <head>

    <meta charset="utf-8">

    <title>JavaScript Message Alert Lab</title>

    <link rel="stylesheet" href="style/style.css">

    <script async src="js/script.js"></script>

  </head>

  <body>

    <h1 class="center">
      JavaScript Event Handling Demo
    </h1>

    <p class="center">
      Type a message below and click the button to see how JavaScript
      interacts with the webpage.
    </p>

    <div id="container">

      <input
        id="entryinput"
        type="text"
        name="textentry"
        placeholder="Enter a message here"
      >

      <div id="entrybutton">
        Alert Me
      </div>

      <h2 id="textoutput" class="center">
        Your message will appear here
      </h2>

    </div>

  </body>

</html>
